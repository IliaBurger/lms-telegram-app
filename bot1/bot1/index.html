<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python LMS Cyber App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-glow: linear-gradient(185deg, #0f0c1b, #05050f);
            --card-bg: rgba(25, 22, 45, 0.65);
            --card-border: rgba(255, 255, 255, 0.07);
            --text-main: #f3f1f9;
            --text-muted: #958fa3;
            --accent-neon: #7f56d9;
            --accent-glow: #6366f1;
            --accent-success: #10b981;
            --accent-lock: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-glow);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 85px;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Премиум Шапка с эффектом размытия заднего плана */
        .header-profile {
            background: rgba(15, 12, 27, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 90;
        }
        .user-info h3 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
        .user-info p { margin: 5px 0 0 0; font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .xp-badge {
            background: linear-gradient(135deg, var(--accent-neon), var(--accent-glow));
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .container { padding: 20px; }
        .screen { display: none; animation: fadeIn 0.35s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Карточки модулей и Стеклянный дизайн (Glassmorphism) */
        .module-card { margin-bottom: 24px; }
        .module-title { font-size: 13px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; font-weight: 700; letter-spacing: 1px; }

        .lesson-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .lesson-item:active { transform: scale(0.98); background: rgba(255,255,255,0.03); }
        .lesson-item.locked { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .lesson-info { flex: 1; }
        .lesson-name { font-weight: 600; font-size: 16px; color: #fff; margin-bottom: 4px; }
        .lesson-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

        /* Иконки статуса */
        .lesson-status { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; margin-left: 12px; }
        .status-completed { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); }
        .status-available { background: rgba(127, 86, 217, 0.15); color: var(--accent-neon); }
        .status-locked { background: rgba(239, 68, 68, 0.1); color: var(--accent-lock); }

        /* Лидерборд */
        .leaderboard-list { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; overflow: hidden; }
        .leader-row { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--card-border); transition: background 0.2s; }
        .leader-row:last-child { border-bottom: none; }
        .leader-row.current-user { background: rgba(99, 102, 241, 0.12); border-left: 3px solid var(--accent-glow); }
        .leader-pos { width: 35px; font-weight: 800; font-size: 15px; color: var(--text-muted); }
        .leader-row:nth-child(1) .leader-pos { color: #ffd700; }
        .leader-row:nth-child(2) .leader-pos { color: #c0c0c0; }
        .leader-row:nth-child(3) .leader-pos { color: #cd7f32; }
        .leader-name { flex: 1; font-size: 15px; font-weight: 500; color: #fff; }
        .leader-rank { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
        .leader-xp { font-weight: 700; color: var(--accent-glow); font-size: 14px; }

        /* Окно урока и Блоки кода */
        .content-box { background: var(--card-bg); border: 1px solid var(--card-border); padding: 20px; border-radius: 18px; margin-bottom: 14px; }

        pre {
            background: #090714; border: 1px solid rgba(255,255,255,0.04); border-radius: 10px;
            padding: 14px; overflow-x: auto; font-family: 'Courier New', Courier, monospace; font-size: 13px; color: #a5b4fc;
        }

        textarea {
            width: 100%; height: 120px; border-radius: 12px; background: #090714; border: 1px solid var(--card-border);
            padding: 14px; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; font-size: 14px; color: #fff; margin-top: 12px; outline: none; transition: border 0.2s;
        }
        textarea:focus { border-color: var(--accent-glow); }

        button.btn {
            background: linear-gradient(135deg, var(--accent-neon), var(--accent-glow));
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
            color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        button.btn:active { opacity: 0.9; }

        /* Нижний Навигационный Таб-бар */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 68px;
            background: rgba(15, 12, 27, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--card-border); display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .tab-item { text-align: center; color: var(--text-muted); cursor: pointer; font-size: 11px; font-weight: 500; flex: 1; padding: 10px 0; transition: color 0.2s; }
        .tab-item.active { color: var(--accent-glow); font-weight: 700; }
        .tab-icon { font-size: 22px; margin-bottom: 4px; transition: transform 0.2s; }
        .tab-item.active .tab-icon { transform: translateY(-2px); }
    </style>
</head>
<body>

<!-- Шапка профиля -->
<div class="header-profile">
    <div class="user-info">
        <h3 id="top-username">Загрузка...</h3>
        <p id="top-rank">Определяем ранг...</p>
    </div>
    <div class="xp-badge"><span id="top-xp">0</span> XP</div>
</div>

<div class="container">
    <!-- ЭКРАН 1: КАРТА КУРСА -->
    <div id="screen-course" class="screen active">
        <div id="course-map-container"></div>
    </div>

    <!-- ЭКРАН 2: ЛИДЕРБОРД -->
    <div id="screen-leaders" class="screen">
        <h2 style="font-size: 20px; margin-top:0; margin-bottom: 16px; font-weight: 700;">Рейтинг студентов</h2>
        <div class="leaderboard-list" id="leaderboard-container"></div>
    </div>

    <!-- ЭКРАН 3: ПРОСМОТР УРОКА -->
    <div id="screen-lesson" class="screen">
        <button onclick="switchScreen('course')" style="background:none; border:none; color:var(--accent-glow); padding:0; margin-bottom:16px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px;">← Назад к модулям</button>
        <div class="content-box">
            <h2 id="lesson-title" style="margin-top:0; font-size:20px; font-weight:700;"></h2>
            <div id="lesson-body" style="font-size:15px; line-height:1.6; color: #dbd8e3;"></div>
        </div>
        <div class="content-box">
            <h3 style="margin-top:0; font-size:16px; color:var(--accent-glow); font-weight:700; display:flex; align-items:center; gap:6px;">⚡ Практическая задача</h3>
            <p id="lesson-task" style="font-size:14px; margin-bottom:12px; line-height:1.5; color: #b2adbe;"></p>
            <textarea id="user-code-input" placeholder="Введи решение на Python..."></textarea>
            <button class="btn" style="margin-top:14px;" onclick="submitPractice()">Отправить ответ</button>
        </div>
    </div>
</div>

<!-- Навигационный таб-бар -->
<div class="tab-bar">
    <div class="tab-item active" id="tab-course" onclick="switchScreen('course')">
        <div class="tab-icon">📚</div>
        <div>Обучение</div>
    </div>
    <div class="tab-item" id="tab-leaders" onclick="switchScreen('leaders')">
        <div class="tab-icon">🏆</div>
        <div>Рейтинг</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const API_URL = "http://localhost:5000/api";

    let user = {
        id: tg.initDataUnsafe?.user?.id || 777777,
        username: tg.initDataUnsafe?.user?.username || "Local_Tester"
    };

    let currentOpenLessonId = null;

    async function initLMS() {
        try {
            const loginRes = await fetch(`${API_URL}/user/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramId: user.id, username: user.username })
            });
            const profile = await loginRes.json();
            updateHeader(profile);

            await loadCourseMap();
            await loadLeaderboard();
        } catch (err) {
            console.error("Ошибка:", err);
        }
    }

    function updateHeader(profile) {
        document.getElementById('top-username').innerText = `@${profile.username}`;
        document.getElementById('top-rank').innerText = profile.rank || "Новичок";
        document.getElementById('top-xp').innerText = profile.totalXp;
    }

    async function loadCourseMap() {
        const res = await fetch(`${API_URL}/course/map?telegramId=${user.id}`);
        const modules = await res.json();
        const container = document.getElementById('course-map-container');
        container.innerHTML = '';

        modules.forEach(mod => {
            let modHtml = `<div class="module-card"><div class="module-title">${mod.title}</div>`;
            mod.lessons.forEach(les => {
                let statusClass = les.isCompleted ? "status-completed" : (les.isLocked ? "status-locked" : "status-available");
                let statusIcon = les.isCompleted ? "✓" : (les.isLocked ? "🔒" : "•");
                let onClickAction = les.isLocked ? '' : `onclick="openLesson('${les.id}')"`;

                modHtml += `
                        <div class="lesson-item ${les.isLocked ? 'locked' : ''}" ${onClickAction}>
                            <div class="lesson-info">
                                <div class="lesson-name">${les.title}</div>
                                <div class="lesson-desc">${les.desc}</div>
                            </div>
                            <div class="lesson-status ${statusClass}">${statusIcon}</div>
                        </div>`;
            });
            modHtml += `</div>`;
            container.innerHTML += modHtml;
        });
    }

    async function loadLeaderboard() {
        const res = await fetch(`${API_URL}/leaderboard?telegramId=${user.id}`);
        const leaders = await res.json();
        const container = document.getElementById('leaderboard-container');
        container.innerHTML = '';

        leaders.forEach(row => {
            container.innerHTML += `
                    <div class="leader-row ${row.IsCurrentUser ? 'current-user' : ''}">
                        <div class="leader-pos">#${row.Position}</div>
                        <div class="leader-name">
                            <div>${row.Username} ${row.IsCurrentUser ? '(Ты)' : ''}</div>
                            <div class="leader-rank">${row.Rank}</div>
                        </div>
                        <div class="leader-xp">${row.TotalXp} XP</div>
                    </div>`;
        });
    }

    async function openLesson(lessonId) {
        const res = await fetch(`${API_URL}/course/lesson?id=${lessonId}&telegramId=${user.id}`);
        if(res.status === 403) {
            alert("Урок еще заблокирован.");
            return;
        }
        const lesson = await res.json();
        currentOpenLessonId = lesson.id;

        document.getElementById('lesson-title').innerText = lesson.title;

        // Превращаем текст в красивый HTML с блоками кода
        let contentHtml = lesson.content
            .replace(/\\n/g, '<br>')
            .replace(/```python([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.08); padding:2px 6px; border-radius:4px; color:#f43f5e;">$1</code>');

        document.getElementById('lesson-body').innerHTML = contentHtml;
        document.getElementById('lesson-task').innerText = lesson.task;
        document.getElementById('user-code-input').value = '';

        switchScreen('lesson');
    }

    async function submitPractice() {
        const code = document.getElementById('user-code-input').value;
        if(!code.trim()) return;

        const res = await fetch(`${API_URL}/course/submit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ telegramId: user.id, lessonId: currentOpenLessonId, userCode: code })
        });
        const result = await res.json();

        alert(result.feedback);

        if(result.success) {
            await initLMS();
            switchScreen('course');
        }
    }

    function switchScreen(screenName) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

        if (screenName === 'course') {
            document.getElementById('screen-course').classList.add('active');
            document.getElementById('tab-course').classList.add('active');
            loadCourseMap();
        } else if (screenName === 'leaders') {
            document.getElementById('screen-leaders').classList.add('active');
            document.getElementById('tab-leaders').classList.add('active');
            loadLeaderboard();
        } else if (screenName === 'lesson') {
            document.getElementById('screen-lesson').classList.add('active');
        }
    }

    window.onload = initLMS;
</script>
</body>
</html>
